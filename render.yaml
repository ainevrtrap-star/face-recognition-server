services:
  - type: web
    name: face-recognition-server
    runtime: python
    region: singapore
    plan: free
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn server:app --timeout 120 --workers 1 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: true
    healthCheckPath: /health
    autoDeploy: true
