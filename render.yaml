services:
  - type: web
    name: face-recognition-api
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: MONGODB_URI
        sync: false  # You'll set this manually